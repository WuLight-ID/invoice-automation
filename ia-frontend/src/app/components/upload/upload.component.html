<div class="max-w-3xl mx-auto space-y-6">

      <!-- Title -->
      <h2 class="text-2xl font-semibold">Upload Invoice</h2>

      <!-- Upload Card -->
      <div class="bg-white p-6 rounded-xl shadow">

        <input type="file" (change)="onFileSelected($event)" />

        <button
          (click)="upload()"
          class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
          Upload & Extract
        </button>

        <p *ngIf="loading" class="mt-3 text-blue-500">Processing...</p>
      </div>

      <!-- Result Card -->
      <div *ngIf="result" class="bg-white p-6 rounded-xl shadow">
        <h3 class="text-lg font-semibold mb-4">Result</h3>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <p class="text-gray-500 text-sm">Supplier</p>
            <p class="font-medium">{{ result.supplierName }}</p>
          </div>

          <div>
            <p class="text-gray-500 text-sm">Invoice #</p>
            <p class="font-medium">{{ result.invoiceNumber }}</p>
          </div>

          <div>
            <p class="text-gray-500 text-sm">Date</p>
            <p class="font-medium">{{ result.date }}</p>
          </div>

          <div>
            <p class="text-gray-500 text-sm">Amount</p>
            <p class="font-medium">{{ result.totalAmount }}</p>
          </div>
        </div>
      </div>

    </div>
